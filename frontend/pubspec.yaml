name: sellio_metrics
description: Sellio Squad — Team Metrics Dashboard built with Flutter Web & Hux UI
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  hux: ^0.25.0
  provider: ^6.1.2
  fl_chart: ^0.70.2
  intl: ^0.20.0
  http: ^1.3.0
  url_launcher: ^6.3.1
  flutter_localizations:
    sdk: flutter
  go_router: ^17.1.0
  dio: ^5.9.2
  web: ^1.1.0
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.13.0
  injectable_generator: ^2.12.1
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/official_logo.png
