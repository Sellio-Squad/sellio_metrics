# ─── Sellio Metrics — Cloudflare Worker Config ───────────────
#
# Deploys the Fastify backend as a Cloudflare Worker.
# Uses nodejs_compat for Octokit, Awilix, and Pino support.
#
# Secrets (set via dashboard or `wrangler secret put`):
#   APP_ID, INSTALLATION_ID, APP_PRIVATE_KEY, GEMINI_API_KEY

name = "sellio-metrics"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
GITHUB_ORG = "Sellio-Squad"
LOG_LEVEL = "info"
NODE_ENV = "production"
GOOGLE_REDIRECT_URI = "https://sellio-metrics.abdoessam743.workers.dev/api/meetings/oauth2callback"
GOOGLE_PUBSUB_TOPIC = "projects/meet-test-488313/topics/meet-events-topic"

# ─── Workers KV Namespaces ───────────────────────────────────
# After first deploy, create namespaces via:
#   npx wrangler kv namespace create CACHE
#   npx wrangler kv namespace create SCORES_KV
#   npx wrangler kv namespace create MEMBERS_KV
#   npx wrangler kv namespace create ATTENDANCE_KV
# Then paste the generated IDs below.

[[kv_namespaces]]
binding = "CACHE"
id = "843d801d5cb14986995bf6f15f914002"

[[kv_namespaces]]
binding = "SCORES_KV"
id = "57a28a5405444d7f90f96450936f0252"

[[kv_namespaces]]
binding = "MEMBERS_KV"
id = "9aa95de0682d4640b5ba79be205e8ded"

[[kv_namespaces]]
binding = "ATTENDANCE_KV"
id = "334dd81b0a1748d8a9cf307018eee24e"

# ─── D1 Database ─────────────────────────────────────────────
# Create via: npx wrangler d1 create sellio-metrics-db
# Apply migration: npx wrangler d1 migrations apply sellio-metrics-db

[[d1_databases]]
binding = "DB"
database_name = "sellio-metrics-db"
database_id = "a7ae3b9f-87c7-4696-be19-8660777703c7"
migrations_dir = "migrations"

# ─── Durable Objects ─────────────────────────────────────────
# MeetingRoom — one instance per meeting session.
# Maintains WebSocket connections + broadcasts events.
# Provisioned automatically on first access.

[[durable_objects.bindings]]
name = "MEETING_ROOMS"
class_name = "MeetingRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MeetingRoom"]

# ─── Cloudflare Queues ───────────────────────────────────────
# Queue for offloading heavy webhook background tasks

[[queues.producers]]
queue = "webhook"
binding = "WEBHOOK_QUEUE"

[[queues.consumers]]
queue = "webhook"
max_batch_size = 10
max_retries = 3

# Queue for long-running GitHub sync jobs (PRs + commits per repo)
# Consumer gets up to 15 minutes per batch — no 30s wall-time limit
[[queues.producers]]
queue = "sync-jobs"
binding = "SYNC_QUEUE"

[[queues.consumers]]
queue = "sync-jobs"
max_batch_size = 1
max_batch_timeout = 30
max_retries = 2

# ─── Cron Triggers ───────────────────────────────────────────
# Precompute leaderboard snapshots every 6 hours

[triggers]
crons = ["0 */6 * * *"]

